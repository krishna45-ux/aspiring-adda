[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy /api/* to Netlify Functions
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
